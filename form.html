<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Form</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow border-0 p-4">
                    <div class="card-body">
                        <h2 class="text-center fw-bold text-primary mb-1">Buat Account Baru</h2>
                        <h5 class="text-center text-muted mb-4">Sign Up Form</h5>
                        <hr class="mb-4">

                        <form action="welcome.html">
                            <!-- First Name & Last Name -->
                            <div class="row g-3 mb-3">
                                <div class="col">
                                    <label class="form-label fw-bold">First Name</label>
                                    <input type="text" name="First Name" class="form-control" placeholder="Nama Depan" required>
                                </div>
                                <div class="col">
                                    <label class="form-label fw-bold">Last Name</label>
                                    <input type="text" name="Last Name" class="form-control" placeholder="Nama Belakang" required>
                                </div>
                            </div>

                            <!-- Gender -->
                            <div class="mb-3">
                                <label class="form-label d-block fw-bold">Gender</label>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" id="male" value="Male" required>
                                    <label class="form-check-label" for="male">Male</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" id="female" value="Female">
                                    <label class="form-check-label" for="female">Female</label>
                                </div>
                            </div>

                            <!-- Nationality -->
                            <div class="mb-3">
                                <label class="form-label fw-bold">Nationality</label>
                                <select class="form-select">
                                    <option value="Indonesian">Indonesian</option>
                                    <option value="Jermany">Jermany</option>
                                    <option value="other">other</option>
                                </select>
                            </div>

                            <!-- Language Spoken -->
                            <div class="mb-3">
                                <label class="form-label d-block fw-bold">Language Spoken</label>
                                <div class="form-check mb-1">
                                    <input class="form-check-input" type="checkbox" id="lang-id" value="Bahasa Indonesia">
                                    <label class="form-check-label" for="lang-id">Bahasa Indonesia</label>
                                </div>
                                <div class="form-check mb-1">
                                    <input class="form-check-input" type="checkbox" id="lang-en" value="English">
                                    <label class="form-check-label" for="lang-en">English</label>
                                </div>
                                <div class="form-check mb-1">
                                    <input class="form-check-input" type="checkbox" id="lang-jp" value="Japan">
                                    <label class="form-check-label" for="lang-jp">other</label>
                                </div>
                            </div>

                            <!-- Bio -->
                            <div class="mb-4">
                                <label class="form-label fw-bold">Bio</label>
                                <textarea class="form-control" rows="4" placeholder="Ceritakan singkat tentang dirimu..."></textarea>
                            </div>

                            <!-- Submit Button -->
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg shadow-sm">Sign Up</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
